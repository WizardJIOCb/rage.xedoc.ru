# Nginx config for rage.xedoc.ru
# Place: /etc/nginx/sites-available/rage.xedoc.ru
# Enable: ln -s ... /etc/nginx/sites-enabled/ ; rm -f /etc/nginx/sites-enabled/default
# Test + reload: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name rage.xedoc.ru www.rage.xedoc.ru;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name rage.xedoc.ru www.rage.xedoc.ru;

    ssl_certificate /etc/letsencrypt/live/rage.xedoc.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rage.xedoc.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Serve the Socket.IO client JS statically (exact match, avoids going through node for the script tag)
    location = /socket.io/socket.io.js {
        root /var/www/rage.xedoc.ru/public;
        access_log off;
    }

    # Socket.IO polling + websocket upgrade - MUST proxy with correct subpath
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Static files from public/ + fallback to index.html (SPA)
    location / {
        root /var/www/rage.xedoc.ru/public;
        try_files $uri $uri/ /index.html;
    }
}
