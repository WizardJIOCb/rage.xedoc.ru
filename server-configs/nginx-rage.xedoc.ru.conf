# Nginx config for rage.xedoc.ru
# Place in /etc/nginx/sites-available/rage.xedoc.ru
# Then: sudo ln -s /etc/nginx/sites-available/rage.xedoc.ru /etc/nginx/sites-enabled/
# Test: sudo nginx -t
# Reload: sudo systemctl reload nginx

server {
    listen 80;
    server_name rage.xedoc.ru www.rage.xedoc.ru;

    # Redirect HTTP to HTTPS (uncomment after certbot)
    # return 301 https://$host$request_uri;

    # For initial setup (HTTP only, before SSL)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (CRITICAL for Socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts for long-lived connections (Socket.io)
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}